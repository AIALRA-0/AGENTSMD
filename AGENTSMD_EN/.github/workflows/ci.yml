name: AGENTSMD CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Markdown lint
        run: bash scripts/check_markdown.sh

      - name: Validate rules
        run: python3 scripts/md_validate.py

      - name: Sync index
        run: python3 scripts/md_index_sync.py

      - name: Validate after sync
        run: python3 scripts/md_validate.py

      - name: Ensure no unsynced changes
        run: git diff --exit-code
