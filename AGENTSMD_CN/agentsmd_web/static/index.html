<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGENTSMD 本地可视化控制台</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>AGENTSMD 控制台</h1>
        <p>本地文件树 / Markdown 编辑 / 一键校验同步</p>
      </div>
      <div class="actions">
        <button id="btn-refresh-tree">刷新树</button>
        <button id="btn-theme">切换夜间</button>
        <button id="btn-render">渲染预览</button>
        <button id="btn-save" class="primary">保存文件</button>
        <button id="btn-lint">语法检查</button>
        <button id="btn-index-sync">索引更新</button>
        <button id="btn-md-sync" class="primary">一键同步</button>
        <button id="btn-backup">手动备份</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel tree-panel">
        <div class="panel-head">
          <h2>文件树</h2>
          <div class="tree-tools">
            <button id="btn-tree-expand-all" type="button">展开</button>
            <button id="btn-tree-collapse-all" type="button">折叠</button>
            <select id="file-sort" title="文件排序">
              <option value="name_asc">字母 A-Z</option>
              <option value="name_desc">字母 Z-A</option>
              <option value="mtime_desc">修改时间 新→旧</option>
              <option value="mtime_asc">修改时间 旧→新</option>
            </select>
          </div>
        </div>
        <div class="recent-box">
          <div class="recent-head">最近修改</div>
          <ul id="recent-root" class="recent-list"></ul>
        </div>
        <div id="tree-root" class="tree-root"></div>
      </aside>

      <section class="panel editor-panel">
        <div class="panel-head">
          <h2>编辑器</h2>
          <span id="current-file">未选择文件</span>
        </div>
        <textarea id="editor" spellcheck="false" placeholder="选择左侧 Markdown 文件后在这里编辑"></textarea>
      </section>

      <section class="panel preview-panel">
        <h2>预览</h2>
        <div id="preview" class="preview"></div>
      </section>
    </main>

    <footer class="statusbar">
      <span id="status">就绪</span>
    </footer>

    <section class="panel output-panel">
      <div class="panel-head">
        <h2>执行日志</h2>
        <span id="last-command">-</span>
      </div>
      <pre id="output"></pre>
    </section>

    <script src="/static/app.js"></script>
  </body>
</html>
