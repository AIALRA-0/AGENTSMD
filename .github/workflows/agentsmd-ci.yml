name: AGENTSMD CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.discover.outputs.count }}
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover AGENTSMD targets
        id: discover
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path('.').resolve()
          required = [
              Path('scripts/check_markdown.sh'),
              Path('scripts/normalize_blank_lines.py'),
              Path('scripts/md_validate.py'),
              Path('scripts/md_index_sync.py'),
              Path('scripts/md_workflow_guard.py'),
              Path('MD_SYNTAX_CHECK.md'),
          ]

          def is_target(dir_path: Path) -> bool:
              return dir_path.is_dir() and all((dir_path / p).exists() for p in required)

          targets = set()

          # include current repo root when applicable
          if root.name.startswith('AGENTSMD') and is_target(root):
              targets.add('.')

          # include nested AGENTSMD* directories
          for p in root.rglob('*'):
              if p.is_dir() and p.name.startswith('AGENTSMD') and is_target(p):
                  targets.add(p.relative_to(root).as_posix())

          target_list = sorted(targets)
          matrix = {'include': [{'path': t} for t in target_list]}

          print('Discovered targets:', target_list)
          gh_out = Path(os.environ['GITHUB_OUTPUT'])
          with gh_out.open('a', encoding='utf-8') as f:
              f.write(f"count={len(target_list)}\n")
              f.write('matrix<<JSON\n')
              f.write(json.dumps(matrix))
              f.write('\nJSON\n')
          PY

  validate:
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install local Node devDependencies
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          elif [ -f package.json ]; then
            npm install --no-audit --no-fund
          else
            echo "No package.json found, skip npm install."
          fi

      - name: Markdown lint (auto-fix safe)
        working-directory: ${{ matrix.path }}
        run: bash scripts/check_markdown.sh

      - name: Validate rules (auto-fix index)
        working-directory: ${{ matrix.path }}
        run: python3 scripts/md_validate.py --auto-fix-index

      - name: Sync index
        working-directory: ${{ matrix.path }}
        run: python3 scripts/md_index_sync.py

      - name: Normalize blank lines after index sync
        working-directory: ${{ matrix.path }}
        run: python3 scripts/normalize_blank_lines.py

      - name: Markdown lint re-check
        working-directory: ${{ matrix.path }}
        run: bash scripts/check_markdown.sh

      - name: Validate after sync (auto-fix index)
        working-directory: ${{ matrix.path }}
        run: python3 scripts/md_validate.py --auto-fix-index

      - name: Workflow guard report (non-blocking)
        working-directory: ${{ matrix.path }}
        run: python3 scripts/md_workflow_guard.py --report-only --format github --base-ref "${{ github.event.pull_request.base.sha || github.sha }}" --head-ref "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Optional configValidationFlow integration
        if: always()
        working-directory: ${{ matrix.path }}
        env:
          AGENTSMD_RUN_CONFIG_VALIDATION_FLOW: ${{ vars.AGENTSMD_RUN_CONFIG_VALIDATION_FLOW }}
          AGENTSMD_FAIL_ON_SKIP: ${{ vars.AGENTSMD_FAIL_ON_SKIP }}
        run: bash scripts/run_optional_integration.sh

      - name: Upload workflow guard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-guard-${{ matrix.path }}
          path: |
            ${{ matrix.path }}/workflow_guard_report.md
            ${{ matrix.path }}/workflow_guard_report.json
          if-no-files-found: ignore

      - name: Auto-fix diff report (non-blocking)
        if: always()
        run: |
          if ! git diff --quiet; then
            echo "::warning::CI applied safe auto-fixes. Please sync local changes."
            git diff --stat
            git diff > agentsmd_autofix.patch
          else
            echo "No auto-fix diff generated."
          fi

      - name: Upload auto-fix patch
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentsmd-autofix-${{ matrix.path }}
          path: agentsmd_autofix.patch
          if-no-files-found: ignore

  no-target:
    needs: discover
    if: needs.discover.outputs.count == '0'
    runs-on: ubuntu-latest
    steps:
      - name: No AGENTSMD target found
        run: echo "No AGENTSMD* directory with required scripts was found. Skip validation."
